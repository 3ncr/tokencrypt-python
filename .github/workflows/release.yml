name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish-pypi:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: twine upload
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Verify release tag matches pyproject.toml version
        run: |
          set -euo pipefail
          manifest_version=$(grep -E '^version = "' pyproject.toml | head -1 | cut -d'"' -f2)
          tag="${GITHUB_REF#refs/tags/}"
          tag_version="${tag#v}"
          if [ "$manifest_version" != "$tag_version" ]; then
            echo "::error::pyproject.toml version ($manifest_version) does not match release tag ($tag)"
            exit 1
          fi
          echo "Publishing 3ncr $manifest_version"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Run tests
        run: |
          python -m pip install -e '.[dev]'
          pytest -v

      - name: Build sdist + wheel
        run: python -m build

      - name: Twine check
        run: python -m twine check dist/*

      - name: Twine upload
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload dist/*
