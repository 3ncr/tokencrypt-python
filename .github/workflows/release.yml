name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish-pypi:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: twine upload
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Verify release tag matches pyproject.toml version
        run: |
          set -euo pipefail
          manifest_version=$(grep -E '^version = "' pyproject.toml | head -1 | cut -d'"' -f2)
          tag="${GITHUB_REF#refs/tags/}"
          tag_version="${tag#v}"
          if [ "$manifest_version" != "$tag_version" ]; then
            echo "::error::pyproject.toml version ($manifest_version) does not match release tag ($tag)"
            exit 1
          fi
          echo "Publishing 3ncr $manifest_version"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Run tests
        run: |
          python -m pip install -e '.[dev]'
          pytest -v

      - name: Build sdist + wheel
        run: python -m build

      - name: Twine check
        run: python -m twine check dist/*

      - name: Twine upload
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload dist/*
